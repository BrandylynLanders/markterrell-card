<!DOCTYPE html>
<html lang="en" xmlns="http://www.w3.org/1999/xhtml">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Mark Terrell</title>

    <!-- Font -->
    <link href="https://fonts.googleapis.com" rel="preconnect" />
    <link crossorigin="crossorigin" href="https://fonts.gstatic.com" rel="preconnect" />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&display=swap"
      rel="stylesheet"
    />

    <style>
      :root {
        --navy-900: #062a4a;
        --navy-800: #08365f;
        --navy-700: #0a3f6f;

        --panel: #eaf2ff;        /* light blue panel */
        --panel-2: #f4f8ff;      /* subtle lift */
        --ink: #0b2440;          /* headline ink */
        --muted: #365b7d;

        --btn: #0a3e73;
        --btn-hover: #094070;
        --btn-text: #ffffff;

        --ring: #2d73b9;
        --shadow: 0 18px 40px rgba(0, 0, 0, 0.18);
        --radius: 28px;
      }

      * { box-sizing: border-box; }
      html, body { height: 100%; }

      body {
        margin: 0;
        font-family: "Montserrat", system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
        color: var(--ink);
        display: flex;
        justify-content: center;
        align-items: flex-start;
        padding: 28px 16px 44px;

        /* SPOTLIGHT BACKGROUND */
        background:
          radial-gradient(
            600px 420px at 50% 180px,
            rgba(160, 205, 255, 0.35) 0%,
            rgba(160, 205, 255, 0.18) 25%,
            rgba(160, 205, 255, 0.08) 45%,
            transparent 70%
          ),
          linear-gradient(
            180deg,
            #1b4f86 0%,
            #133e6d 40%,
            #0b2c4d 100%
          );
      }

      .wrap {
        width: 100%;
        max-width: 420px;
      }

      .frame {
        position: relative;        /* needed for absolute child positioning */
        border-radius: 18px;
        /* IMPORTANT: don't clip the avatar */
        overflow: visible;         /* was hidden */
        box-shadow: var(--shadow);
        min-height: 640px;
        background:
          linear-gradient(180deg, rgba(255,255,255,0.08), rgba(255,255,255,0.0) 40%),
          linear-gradient(180deg, var(--navy-900), var(--navy-700));
        padding: 22px 18px 18px;
      }

      /* Light panel (the main card) */
      .panel {
        position: relative;
        margin-top: 94px; /* space for overlapping avatar */
        background: linear-gradient(180deg, var(--panel), var(--panel-2));
        border-radius: var(--radius);
        padding: 92px 18px 16px; /* top padding includes headline spacing */
      }

      /* Avatar ring + overlap */
      .avatar-wrap {
        position: absolute;        /* take it out of normal flow */
        left: 50%;
        top: 18px;                 /* move up/down */
        transform: translateX(-50%);
        width: 162px;
        height: 162px;
        border-radius: 999px;
        background: rgba(45, 115, 185, 0.65);
        display: grid;
        place-items: center;
        z-index: 5;                /* ensure it's in front */
      }

      .avatar-ring {
        width: 142px;
        height: 142px;
        border-radius: 999px;
        background: rgba(255,255,255,0.18);
        display: grid;
        place-items: center;
      }

      .avatar {
        width: 126px;
        height: 126px;
        border-radius: 999px;
        object-fit: cover;
        background: #fff;
        border: 4px solid rgba(255, 255, 255, 0.85);
      }

      /* Big stacked headline like the sample */
      .headline {
        text-align: center;
        line-height: 1.05;
        margin: 0;
        padding: 0 6px;
        letter-spacing: 0.2px;
        color: #0b3d66;
      }

      .headline .top {
        display: block;
        font-weight: 500;
        font-size: 2.05rem;
      }
      .headline .mid {
        display: block;
        font-weight: 800;
        font-size: 2.25rem;
        margin-top: 6px;
        color: #0a3e73;
      }
      .headline .bot {
        display: block;
        font-weight: 500;
        font-size: 2.05rem;
        margin-top: 6px;
      }

      /* Supporting identity line (optional but helpful) */
      .sub {
        text-align: center;
        margin: 10px auto 0;
        font-size: 0.92rem;
        color: var(--muted);
        max-width: 42ch;
        line-height: 1.35;
      }

      /* Button stack */
      .btns {
        list-style: none;
        padding: 0;
        margin: 18px 0 0;
        display: grid;
        gap: 12px;
      }

      .action {
        display: flex;
        align-items: center;
        gap: 12px;
        width: 100%;
        background: var(--btn);
        color: var(--btn-text);
        text-decoration: none;
        border-radius: 10px;
        padding: 12px 14px;
        border: 1px solid rgba(255,255,255,0.14);
        box-shadow: 0 10px 18px rgba(10, 62, 115, 0.18);
        transition: transform 80ms ease, background 140ms ease, box-shadow 140ms ease;
      }

      .action:hover {
        background: var(--btn-hover);
        box-shadow: 0 14px 24px rgba(10, 62, 115, 0.22);
      }

      .action:active { transform: translateY(1px); }

      /* Left icon tile (like the mockup) */
      .tile {
        width: 40px;
        height: 34px;
        border-radius: 6px;
        background: rgba(255,255,255,0.12);
        border: 1px solid rgba(255,255,255,0.18);
        display: grid;
        place-items: center;
        flex: 0 0 auto;
      }

      .tile svg {
        width: 18px;
        height: 18px;
        fill: #ffffff;
        opacity: 0.95;
      }

      .label {
        font-weight: 600;
        font-size: 0.98rem;
        letter-spacing: 0.15px;
      }

      /* Footer row */
      .footer {
        display: flex;
        justify-content: space-between;
        gap: 10px;
        margin-top: 14px;
        padding: 6px 6px 0;
        color: rgba(10, 62, 115, 0.85);
        font-size: 0.78rem;
      }

      .footer a {
        color: rgba(10, 62, 115, 0.85);
        text-decoration: none;
        font-weight: 600;
      }

      /* Focus */
      a:focus-visible {
        outline: 3px solid rgba(45, 115, 185, 0.35);
        outline-offset: 3px;
        border-radius: 12px;
      }

      @media (max-width: 360px) {
        .headline .top,
        .headline .bot { font-size: 1.85rem; }
        .headline .mid { font-size: 2.05rem; }
      }
      .footer-logo {
        height: 28px;
        opacity: .9;
      }

      .footer a {
        position: relative;
        top: 6px;
      }
      /* .footer-logo {
        filter: drop-shadow(0 2px 6px rgba(0,0,0,.25));
      } */
    </style>
  </head>

  <body>
    <main class="wrap">
      <section class="frame">
        <!-- Overlapping avatar -->
        <div class="avatar-wrap">
          <div class="avatar-ring">
            <img
              class="avatar"
              alt="Mark Terrell headshot"
              src="https://www.belmont.edu/executive-education/faculty-staff-profiles/mark-terrell/_images/mark-terrell.webp"
            />
          </div>
        </div>

        <!-- Light panel -->
        <div class="panel">
          <!-- Big stacked headline (swap text to whatever you want) -->
          <h1 class="headline">
            <span class="top">Mark</span>
            <span class="mid">Terrell</span>
          </h1>

          <!-- Optional supporting line -->
          <div class="sub">
            <div>Client Development Lead</div>
            <div><b>Executive Education</b></div>
            <div><b>Belmont University</b></div>
            <div>Business Developer</div>
            <div>Strategic Leader</div>
            <div>Creator</div>
          </div>

          <!-- Button stack (like the sample) -->
          <ul class="btns">
            <li>
              <a
                class="action"
                download="MarkTerrell.vcf"
                href="data:text/vcard;charset=utf-8,BEGIN%3AVCARD%0AVERSION%3A3.0%0AFN%3AMark%20Terrell%0AORG%3ABelmont%20University%0ATEL%3BTYPE%3DCELL%2CVOICE%3A%2B1%20615%20478%207998%0ATEL%3BTYPE%3DWORK%2CVOICE%3A%2B1%20615%20460%202117%0AEMAIL%3BTYPE%3DINTERNET%3Amark.terrell%40belmont.edu%0AURL%3Ahttps%3A%2F%2Fwww.belmont.edu%2Fexecutive-education%2Ffaculty-staff-profiles%2Fmark-terrell%2F%0AEND%3AVCARD"
              >
                <span class="tile" aria-hidden="true">
                  <!-- contact card icon -->
                  <svg viewBox="0 0 24 24">
                    <path d="M4 6a2 2 0 0 1 2-2h12a2 2 0 0 1 2 2v12a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6zm2 0v12h12V6H6zm2 2h5v2H8V8zm0 4h8v2H8v-2zm0 4h8v2H8v-2z"/>
                  </svg>
                </span>
                <span class="label">Save Contact</span>
              </a>
            </li>

            <li>
              <a class="action" href="mailto:mark.terrell@belmont.edu?subject=Hello%20Mark">
                <span class="tile" aria-hidden="true">
                  <!-- mail icon -->
                  <svg viewBox="0 0 24 24">
                    <path d="M20 4H4a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2zm0 4-8 5L4 8V6l8 5 8-5v2z"/>
                  </svg>
                </span>
                <span class="label">Send Email</span>
              </a>
            </li>

            <li>
              <a class="action" href="https://appt.link/meet-with-mark-terrell-spaa06L6" rel="noopener" target="_blank">
                <span class="tile" aria-hidden="true">
                  <!-- calendar icon -->
                  <svg viewBox="0 0 24 24">
                    <path d="M7 2h2v2h6V2h2v2h3a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h3V2zm15 8H2v10h20V10zM4 8h16V6H4v2z"/>
                  </svg>
                </span>
                <span class="label">Book Time</span>
              </a>
            </li>

            <li>
              <a class="action" href="https://www.linkedin.com/in/mark-w-terrell-25580a1/" rel="noopener" target="_blank">
                <span class="tile" aria-hidden="true">
                  <!-- linkedin icon -->
                  <svg viewBox="0 0 24 24">
                    <path d="M20.45 20.45h-3.55v-5.57c0-1.33-.03-3.04-1.85-3.04-1.85 0-2.13 1.45-2.13 2.94v5.67H9.37V9h3.41v1.56h.05c.48-.9 1.66-1.85 3.41-1.85 3.64 0 4.31 2.4 4.31 5.52v6.22zM5.34 7.43a2.06 2.06 0 1 1 0-4.12 2.06 2.06 0 0 1 0 4.12zM7.11 20.45H3.56V9h3.55v11.45z"/>
                  </svg>
                </span>
                <span class="label">Connect on LinkedIn</span>
              </a>
            </li>
          </ul>

          <!-- Footer like the sample -->
          <div class="footer">
            <img src="https://www.belmont.edu/umac/brand/_images/logo-horiztonal.svg"
                class="footer-logo"
                alt="Belmont University">

            <a href="https://www.belmont.edu/landing/executive-education"
              target="_blank"
              rel="noopener">
              Develop. Lead. Transform.
            </a>
          </div>
        </div>
      </section>
    </main>
  </body>
</html>
